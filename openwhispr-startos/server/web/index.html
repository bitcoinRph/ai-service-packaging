<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="OpenWhispr">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/icon-256.png">
<title>OpenWhispr</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f1220; color: #eef0f7;
    min-height: 100dvh; display: flex; flex-direction: column;
    padding: env(safe-area-inset-top) 16px calc(env(safe-area-inset-bottom) + 16px);
    max-width: 560px; margin: 0 auto;
  }
  header { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; }
  h1 { font-size: 1.15rem; font-weight: 600; }
  #settingsBtn { background: none; border: none; color: #8f96b3; font-size: 1.4rem; cursor: pointer; padding: 6px; }
  #status { min-height: 1.4em; font-size: .9rem; color: #8f96b3; text-align: center; }
  #status.error { color: #ff7a7a; }
  .stage { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
  #recordBtn {
    width: 132px; height: 132px; border-radius: 50%;
    border: none; cursor: pointer; font-size: 3rem;
    background: #2056df; color: white;
    box-shadow: 0 8px 32px rgba(32, 86, 223, .45);
    transition: transform .15s, background .2s;
  }
  #recordBtn:active { transform: scale(.94); }
  #recordBtn.recording { background: #d63a3a; box-shadow: 0 8px 32px rgba(214, 58, 58, .5); animation: pulse 1.4s infinite; }
  #recordBtn:disabled { background: #3a4160; box-shadow: none; cursor: not-allowed; }
  @keyframes pulse { 50% { transform: scale(1.05); } }
  #hint { font-size: .85rem; color: #8f96b3; }
  #transcript {
    width: 100%; min-height: 130px; resize: vertical;
    background: #191d33; color: #eef0f7;
    border: 1px solid #2b3152; border-radius: 12px;
    padding: 12px; font-size: 1rem; line-height: 1.45;
  }
  .row { display: flex; gap: 10px; width: 100%; margin-top: 10px; }
  .btn {
    flex: 1; padding: 13px; border: none; border-radius: 12px;
    font-size: 1rem; font-weight: 600; cursor: pointer;
    background: #262c49; color: #eef0f7;
  }
  .btn.primary { background: #2056df; color: white; }
  dialog {
    background: #191d33; color: #eef0f7; border: 1px solid #2b3152;
    border-radius: 14px; padding: 20px; width: min(92vw, 420px);
  }
  dialog::backdrop { background: rgba(0,0,0,.6); }
  dialog h2 { font-size: 1.05rem; margin-bottom: 12px; }
  dialog label { display: block; font-size: .85rem; color: #8f96b3; margin: 10px 0 4px; }
  dialog input {
    width: 100%; padding: 10px; border-radius: 8px;
    border: 1px solid #2b3152; background: #0f1220; color: #eef0f7; font-size: .95rem;
  }
</style>
</head>
<body>
<header>
  <h1>OpenWhispr</h1>
  <button id="settingsBtn" aria-label="Settings">&#9881;</button>
</header>

<div class="stage">
  <button id="recordBtn" aria-label="Record">&#127908;</button>
  <div id="hint">Tap to record, tap again to transcribe</div>
  <div id="status"></div>
  <textarea id="transcript" placeholder="Your transcript appears here…"></textarea>
  <div class="row">
    <button class="btn primary" id="copyBtn">Copy</button>
    <button class="btn" id="clearBtn">Clear</button>
  </div>
</div>

<dialog id="settings">
  <h2>Settings</h2>
  <label for="tokenInput">API token (StartOS &rarr; OpenWhispr &rarr; Get API Credentials)</label>
  <input id="tokenInput" type="password" autocomplete="off" placeholder="Paste your token">
  <div class="row">
    <button class="btn primary" id="saveSettings">Save</button>
  </div>
</dialog>

<script>
(function () {
  var recordBtn = document.getElementById('recordBtn');
  var statusEl = document.getElementById('status');
  var transcript = document.getElementById('transcript');
  var settings = document.getElementById('settings');
  var tokenInput = document.getElementById('tokenInput');

  var recorder = null;
  var chunks = [];
  var stream = null;

  function token() { return localStorage.getItem('owToken') || ''; }

  function setStatus(msg, isError) {
    statusEl.textContent = msg;
    statusEl.className = isError ? 'error' : '';
  }

  function pickMimeType() {
    var candidates = ['audio/mp4', 'audio/webm;codecs=opus', 'audio/webm'];
    for (var i = 0; i < candidates.length; i++) {
      if (window.MediaRecorder && MediaRecorder.isTypeSupported(candidates[i])) return candidates[i];
    }
    return '';
  }

  async function startRecording() {
    if (!token()) { settings.showModal(); return; }
    try {
      stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (e) {
      setStatus('Microphone access denied: ' + e.message, true);
      return;
    }
    chunks = [];
    var mimeType = pickMimeType();
    recorder = new MediaRecorder(stream, mimeType ? { mimeType: mimeType } : undefined);
    recorder.ondataavailable = function (e) { if (e.data && e.data.size) chunks.push(e.data); };
    recorder.onstop = onRecordingStopped;
    recorder.start();
    recordBtn.classList.add('recording');
    setStatus('Recording… tap to stop');
  }

  function stopRecording() {
    if (recorder && recorder.state !== 'inactive') recorder.stop();
    if (stream) { stream.getTracks().forEach(function (t) { t.stop(); }); stream = null; }
    recordBtn.classList.remove('recording');
  }

  async function onRecordingStopped() {
    var blob = new Blob(chunks, { type: recorder.mimeType || 'audio/webm' });
    if (!blob.size) { setStatus('No audio captured', true); return; }
    setStatus('Transcribing…');
    recordBtn.disabled = true;
    try {
      var ext = (blob.type.indexOf('mp4') !== -1) ? 'm4a' : 'webm';
      var form = new FormData();
      form.append('file', blob, 'recording.' + ext);
      var res = await fetch('/v1/audio/transcriptions', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token() },
        body: form
      });
      if (res.status === 401) {
        setStatus('Invalid token — update it in settings', true);
        settings.showModal();
        return;
      }
      if (res.status === 503) {
        var info = await res.json().catch(function () { return {}; });
        setStatus(info.error || 'Server is still preparing the model — try again shortly', true);
        return;
      }
      if (!res.ok) {
        var err = await res.text();
        setStatus('Error ' + res.status + ': ' + err.slice(0, 200), true);
        return;
      }
      var data = await res.json();
      var text = (data.text || '').trim();
      transcript.value = transcript.value ? transcript.value + ' ' + text : text;
      setStatus(text ? 'Done — copy and paste it anywhere' : 'No speech detected');
    } catch (e) {
      setStatus('Request failed: ' + e.message, true);
    } finally {
      recordBtn.disabled = false;
    }
  }

  recordBtn.addEventListener('click', function () {
    if (recorder && recorder.state === 'recording') stopRecording();
    else startRecording();
  });

  document.getElementById('copyBtn').addEventListener('click', function () {
    if (!transcript.value) return;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(transcript.value).then(
        function () { setStatus('Copied to clipboard'); },
        function () { fallbackCopy(); }
      );
    } else { fallbackCopy(); }
  });

  function fallbackCopy() {
    transcript.focus();
    transcript.select();
    try { document.execCommand('copy'); setStatus('Copied to clipboard'); }
    catch (e) { setStatus('Copy failed — select the text manually', true); }
  }

  document.getElementById('clearBtn').addEventListener('click', function () {
    transcript.value = '';
    setStatus('');
  });

  document.getElementById('settingsBtn').addEventListener('click', function () {
    tokenInput.value = token();
    settings.showModal();
  });

  document.getElementById('saveSettings').addEventListener('click', function () {
    localStorage.setItem('owToken', tokenInput.value.trim());
    settings.close();
    setStatus(token() ? 'Token saved' : 'Token cleared');
  });

  if (!token()) settings.showModal();
})();
</script>
</body>
</html>
